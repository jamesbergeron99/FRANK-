<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frank's Private Office</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        .header { padding: 20px; border-bottom: 2px solid #d4af37; background: #111; text-align: center; }
        h1 { margin: 0; font-style: italic; letter-spacing: 3px; text-transform: uppercase; font-size: 1.8rem; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; padding-bottom: 150px; }
        .msg { max-width: 90%; padding: 20px; border-radius: 10px; line-height: 1.7; font-size: 1.1rem; white-space: pre-wrap; align-self: flex-start; background: #1a1a1a; border-left: 5px solid #d4af37; color: #eee; }
        .user-msg { align-self: flex-end; border-left: none; border-right: 5px solid #d4af37; background: #222; }
        .media-bar { background: #111; padding: 10px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #333; }
        .media-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 8px 15px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .input-area { padding: 20px; background: #111; border-top: 2px solid #d4af37; display: flex; gap: 15px; align-items: center; }
        .pill { flex-grow: 1; display: flex; background: #000; border: 1px solid #d4af37; border-radius: 30px; padding: 5px 20px; align-items: center; }
        #textInput { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        .mic-btn { color: #d4af37; cursor: pointer; font-size: 1.2rem; }
        .mic-active { color: #ff3b3b; text-shadow: 0 0 10px #ff3b3b; }
        .action-btn { background: #d4af37; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .download-btn { margin-top: 15px; padding: 10px; background: #d4af37; color: #000; border: none; cursor: pointer; font-weight: bold; display: block; }
        .toggle-container { margin-top: 10px; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="header">
        <h1>FRANK'S PRIVATE OFFICE</h1>
        <div class="toggle-container">
            <span>FEATURE</span>
            <input type="checkbox" id="modeToggle">
            <span>T.V. SERIES</span>
        </div>
    </div>
    <div id="chat-window"></div>
    <div class="media-bar">
        <button class="media-btn" id="playPauseBtn" onclick="togglePlayback()">PAUSE</button>
    </div>
    <div class="input-area">
        <button class="action-btn" id="uploadBtn" onclick="document.getElementById('scriptInput').click()"><i class="fas fa-file-upload"></i></button>
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" onchange="uploadFiles()">
        <div class="pill">
            <input type="text" id="textInput" placeholder="Ask Frank..." onkeypress="if(event.key==='Enter') sendBanter()">
            <i class="fas fa-microphone mic-btn" id="micBtn" onclick="toggleMic()"></i>
        </div>
        <button class="action-btn" onclick="sendBanter()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const textInput = document.getElementById('textInput');
        const micBtn = document.getElementById('micBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        let audioBuffers = {}, nextToPlay = 0, isPlaying = false, currentSource = null, totalSentences = 0;
        let recognition, isMicOn = false, finalTranscript = "";

        window.onload = () => {
            const welcome = "Welcome to the office, darling. Upload your pages when you're ready.";
            addMessage(welcome); speak(welcome);
        };

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + " ";
                    else interim += e.results[i][0].transcript;
                }
                textInput.value = finalTranscript + interim;
            };
        }

        function toggleMic() {
            initAudio();
            if (!isMicOn) { isMicOn = true; micBtn.classList.add('mic-active'); finalTranscript = ""; recognition.start(); }
            else { isMicOn = false; micBtn.classList.remove('mic-active'); recognition.stop(); }
        }

        async function uploadFiles() {
            const fileInput = document.getElementById('scriptInput');
            const mode = document.getElementById('modeToggle').checked ? 'T.V. Series' : 'Feature Film';
            if (fileInput.files.length === 0) return;
            uploadBtn.disabled = true;
            addMessage("Scanning pages now. This takes a few minutes for a deep audit, darling...", false);
            const formData = new FormData();
            formData.append('mode', mode);
            formData.append('scripts', fileInput.files[0]);
            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                addMessage(data.message, true);
                speak(data.message);
                uploadBtn.disabled = false;
            } catch (err) {
                addMessage("Frank is indisposed.");
                uploadBtn.disabled = false;
            }
        }

        async function sendBanter() {
            const val = textInput.value; if (!val) return;
            textInput.value = ''; finalTranscript = "";
            addMessage(val, false, true);
            const response = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: val }) });
            const data = await response.json();
            addMessage(data.message); speak(data.message);
        }

        function addMessage(text, isReport = false, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? 'msg user-msg' : 'msg';
            div.innerText = text;
            if (isReport) {
                const dl = document.createElement('button');
                dl.className = 'download-btn'; dl.innerText = "DOWNLOAD PDF";
                dl.onclick = () => downloadPDF(text);
                div.appendChild(dl);
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function speak(fullText) {
            initAudio(); stopCurrentAudio();
            const sentences = fullText.replace(/[#*]/g, '').match(/[^.!?]+[.!?]+/g) || [fullText];
            audioBuffers = {}; nextToPlay = 0; totalSentences = sentences.length;
            sentences.forEach(async (sentence, index) => {
                try {
                    const settingsResp = await fetch('/voice-settings');
                    const settings = await settingsResp.json();
                    const ttsResp = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST", headers: { "Authorization": `Basic ${settings.apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ text: sentence, voiceId: "default-oglabcjnetcklcq7rghmbw__frank", modelId: "inworld-tts-1.5-max" })
                    });
                    const data = await ttsResp.json();
                    const audioData = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0)).buffer;
                    audioBuffers[index] = await audioCtx.decodeAudioData(audioData);
                    if (!isPlaying && index === 0) playSequentially();
                } catch (e) {}
            });
        }

        function playSequentially() {
            if (nextToPlay >= totalSentences) { isPlaying = false; return; }
            if (audioBuffers[nextToPlay]) {
                isPlaying = true;
                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = audioBuffers[nextToPlay];
                currentSource.connect(audioCtx.destination);
                currentSource.onended = () => { if (isPlaying) { nextToPlay++; playSequentially(); } };
                currentSource.start();
            } else { setTimeout(playSequentially, 150); }
        }

        function stopCurrentAudio() { isPlaying = false; if (currentSource) { try { currentSource.stop(); } catch (e) {} currentSource = null; } }
        function togglePlayback() { if (isPlaying) { stopCurrentAudio(); } else { playSequentially(); } }
        function downloadPDF(text) {
            const element = document.createElement('div');
            element.innerHTML = `<div style="padding:40px; border:2px solid #d4af37; background:#000; color:#fff;"><h1>FRANK'S AUDIT</h1><p>${text}</p></div>`;
            html2pdf().from(element).save();
        }
        function initAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
    </script>
</body>
</html>
