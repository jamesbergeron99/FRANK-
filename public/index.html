<body onclick="handleFirstInteraction()"> 

<div class="controls">
    <input type="file" id="scriptInput" accept=".pdf" style="display:none;" multiple onchange="uploadFiles()">
    <button class="btn" onclick="checkPaymentBeforeUpload()">PDF UPLOAD</button>
    <button class="mic-btn" id="micBtn" onclick="toggleDictation()">🎙️</button>
    <input type="text" id="userInput" placeholder="Defend your choices..." onkeypress="if(event.key === 'Enter') sendChat()">
    <button class="btn" onclick="sendChat()">Send</button>
</div>

<script>
    // ... keep all your existing variables (chatWindow, audioCtx, etc.) ...

    // 1. THIS HANDLES THE VERY FIRST GREETING ONLY
    async function handleFirstInteraction() {
        if (hasGreeted) return;
        hasGreeted = true;
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        // Your detailed $5 checklist greeting remains untouched
        const greeting = "Hello, darling. I’m Frank. I’m a sophisticated AI engine engineered to scan the DNA of your story. For a mere five dollars per feedback, I perform a comprehensive narrative autopsy. I provide a rigorous spelling and grammar check, a strict formatting audit, a punchy logline, and a detailed synopsis. Then, I dive deep into your character arcs, pacing, and originality. If you're working on a series, I track multiple storylines and trajectories across every episode to ensure your continuity is flawless. Click the PDF Upload button to proceed to payment and let's get to work.";
        speak(greeting);
    }

    // 2. THIS SPECIFICALLY CHECKS PAYMENT ONLY WHEN UPLOADING
    function checkPaymentBeforeUpload() {
        // If they already paid (returned from PayPal), let them pick the file
        if (localStorage.getItem('frank_paid') === 'true') {
            document.getElementById('scriptInput').click();
        } else {
            // Otherwise, show the paywall overlay
            const overlay = document.getElementById('paywall-overlay');
            stopCurrentAudio();
            overlay.style.display = 'flex';
        }
    }

    // 3. THIS CLEARS THE PAYMENT ONLY AFTER ANALYSIS IS DONE
    async function uploadFiles() {
        const fileInput = document.getElementById('scriptInput');
        const mode = document.getElementById('modeToggle').checked ? 'TV Series' : 'Feature';
        if (fileInput.files.length === 0) return;
        
        addMessage(`Frank is initiating a ${mode} scan...`, true);
        const formData = new FormData();
        formData.append('mode', mode);
        for (let i = 0; i < fileInput.files.length; i++) formData.append('scripts', fileInput.files[i]);
        
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            addMessage(data.message); 
            speak(data.message);
            
            // ANALYSIS FINISHED: Now we wipe the payment so they have to pay for the NEXT one
            localStorage.removeItem('frank_paid');
        } catch (err) {
            addMessage("Frank is indisposed. Try again, darling.");
        }
    }

    // ... (Keep the rest of your functions: speak, toggleDictation, sendChat, etc. exactly as they are) ...
</script>
