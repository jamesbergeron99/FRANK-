<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRANK | Executive Script Doctor</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        .msg { max-width: 85%; padding: 15px; border-radius: 8px; line-height: 1.5; font-size: 1.1rem; white-space: pre-wrap; }
        .frank-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #d4af37; color: #eee; }
        .user-msg { align-self: flex-end; background: #d4af37; color: #000; font-weight: bold; }
        .controls { padding: 20px; background: #111; border-top: 2px solid #d4af37; display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #d4af37; color: #d4af37; }
        .btn { background: #d4af37; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div class="controls">
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" onchange="uploadScript()">
        <button class="btn" onclick="document.getElementById('scriptInput').click()">PDF UPLOAD</button>
        <input type="text" id="userInput" placeholder="Talk to Frank..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button class="btn" onclick="sendChat()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

        function addMessage(text, isFrank = true) {
            const div = document.createElement('div');
            div.className = `msg ${isFrank ? 'frank-msg' : 'user-msg'}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function speak(fullText) {
            const settings = await fetch('/voice-settings').then(r => r.json());
            // Split into sentences so Inworld doesn't choke on length
            const sentences = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
            
            for (let sentence of sentences) {
                try {
                    const response = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST",
                        headers: { "Authorization": `Basic ${settings.apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ text: sentence.trim(), voiceId: "default-oglabcjnetcklcq7rghmbw__frank2", modelId: "inworld-tts-1.5-max" })
                    });
                    const data = await response.json();
                    const audioData = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0)).buffer;
                    const buffer = await audioCtx.decodeAudioData(audioData);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start();
                    // Wait for sentence to finish before next one
                    await new Promise(res => setTimeout(res, buffer.duration * 1000));
                } catch (e) { console.error(e); }
            }
        }

        async function uploadScript() {
            const file = document.getElementById('scriptInput').files[0];
            addMessage("Frank is reviewing your script...", true);
            const formData = new FormData();
            formData.append('script', file);
            const res = await fetch('/analyze', { method: 'POST', body: formData }).then(r => r.json());
            addMessage(res.message, true);
            speak(res.message);
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if (!text) return;
            addMessage(text, false);
            input.value = '';
            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: text }) }).then(r => r.json());
            addMessage(res.message, true);
            speak(res.message);
        }
    </script>
</body>
</html>
