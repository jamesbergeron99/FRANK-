<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frank Script Doctor</title>
    </head>
<body>

    <div id="controls">
        <input type="file" id="fileInput" accept=".pdf" />
        
        <label>Feature <input type="checkbox" id="formatToggle"> TV</label>

        <button onclick="startAnalysis()">Get Feedback</button>
        
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="rewindBtn">Rewind</button>
        
        <button onclick="generatePDF()">Download PDF</button>
    </div>

    <div id="output">
        </div>

    <script>
        async function startAnalysis() {
            const fileInput = document.getElementById('fileInput');
            const output = document.getElementById('output');
            const isTV = document.getElementById('formatToggle').checked;

            output.innerText = "Analyzing...";

            // Your stable PDF text extraction logic
            const scriptText = "Extracted text content..."; 

            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scriptText, isTVSeries: isTV })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let sentenceBuffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                output.innerText += chunk;
                sentenceBuffer += chunk;

                // TIGHTENING THE SPEECH: 
                // We split at punctuation to feed the TTS sentences as they arrive.
                if (/[.!?]/.test(sentenceBuffer)) {
                    let sentences = sentenceBuffer.split(/(?<=[.!?])/);
                    sentenceBuffer = sentences.pop(); 
                    sentences.forEach(s => speak(s.trim()));
                }
            }
        }

        function speak(text) {
            if (!text) return;
            // Your established ElevenLabs/Inworld integration
            console.log("Frank Speaking:", text);
        }

        // All your other existing functions remain untouched
        function generatePDF() { /* Your original PDF code */ }
    </script>
</body>
</html>
