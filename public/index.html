<script>
    const chatWindow = document.getElementById('chat-window');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    let audioBuffers = {}, nextToPlay = 0, isPlaying = false, currentSource = null, totalSentences = 0;

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('st') || localStorage.getItem('frank_paid') === 'true') {
            localStorage.setItem('frank_paid', 'true');
            document.getElementById('auth-check').style.display = 'none';
            
            // LOGIC FIX: Check for real feedback before changing greeting
            const hasMemory = localStorage.getItem('frank_last_feedback');
            const welcome = hasMemory 
                ? "Welcome back. I've got your previous notes on file. Let's see if the next installment shows any progress."
                : "Frank is in. Select your format and upload your pages. I don't have all day.";
            
            addMessage(welcome);
            speak(welcome);
        } else {
            window.location.href = "https://www.scriptread.ca";
        }
    };

    async function uploadFiles() {
        const fileInput = document.getElementById('scriptInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const isTV = document.getElementById('modeToggle').checked;
        const mode = isTV ? 'T.V. Series' : 'Feature Film';
        
        if (fileInput.files.length === 0) return;

        uploadBtn.disabled = true;
        uploadBtn.innerText = "SESSION IN PROGRESS...";

        const formData = new FormData();
        formData.append('mode', mode);
        formData.append('scripts', fileInput.files[0]);
        
        // MEMORY FIX: Send the previous feedback to the server
        const memory = localStorage.getItem('frank_last_feedback');
        if (memory) { formData.append('previousContext', memory); }

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            
            // SAVE TO STORAGE: Ensure episode 2 context is kept for episode 3
            localStorage.setItem('frank_last_feedback', data.message);
            
            addMessage(data.message, true); 
            speak(data.message);
            
            // THE REVOLVING DOOR: Reset the payment state before redirecting
            uploadBtn.disabled = false;
            uploadBtn.innerText = isTV ? "START NEXT EPISODE ($5)" : "START SEQUEL / TRILOGY ($5)";
            uploadBtn.onclick = () => {
                localStorage.removeItem('frank_paid'); // CRITICAL: Clear auth so PayPal can issue a fresh token
                window.location.href = "https://www.paypal.com/ncp/payment/VRYUFK4H8K6M6"; 
            };

        } catch (err) { 
            addMessage("Frank is indisposed, honey.");
            uploadBtn.disabled = false;
            uploadBtn.innerText = "RETRY UPLOAD";
        }
    }

    // ... [Keep addMessage, downloadPDF, speak, and playback functions exactly as they were] ...
</script>
