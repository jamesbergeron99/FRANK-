<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRANK | Executive Script Doctor</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #d4af37; background: #111; text-align: center; shrink-0; cursor: pointer; }
        h1 { margin: 0; font-style: italic; letter-spacing: 3px; text-transform: uppercase; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; scroll-behavior: smooth; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 8px; line-height: 1.5; font-size: 1.1rem; white-space: pre-wrap; transition: all 0.3s ease; position: relative; }
        .frank-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #d4af37; color: #eee; }
        .user-msg { align-self: flex-end; background: #d4af37; color: #000; font-weight: bold; }
        .download-btn { display: block; margin-top: 10px; font-size: 0.8rem; color: #d4af37; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; }
        .controls { padding: 15px; background: #111; border-top: 2px solid #d4af37; display: flex; gap: 10px; align-items: center; shrink-0; }
        input[type="text"] { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #d4af37; color: #d4af37; font-size: 1rem; }
        .media-bar { background: #1a1a1a; border-top: 1px solid #333; padding: 10px; display: flex; justify-content: center; gap: 20px; align-items: center; }
        .media-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 15px; cursor: pointer; font-family: serif; font-size: 0.9rem; }
        .media-btn:hover { background: #d4af37; color: #000; }
        .btn { background: #d4af37; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .mic-btn { background: #800; color: #fff; border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .mic-active { background: #f00; box-shadow: 0 0 15px #f00; }
    </style>
</head>
<body onclick="handleFirstInteraction()">
    <div class="header">
        <h1>FRANK</h1>
        <p><em>"Development is a blood sport, darling."</em></p>
    </div>

    <div id="chat-window">
        <div class="msg frank-msg">"I'm here, darling. Upload the pages and let's see if you've written a masterpiece or a doorstop."</div>
    </div>

    <div class="media-bar">
        <button class="media-btn" onclick="skipAudio(-1)">« BACK</button>
        <button class="media-btn" id="playPauseBtn" onclick="togglePlayback()">PAUSE</button>
        <button class="media-btn" onclick="skipAudio(1)">NEXT »</button>
    </div>

    <div class="controls">
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" onchange="uploadScript()">
        <button class="btn" onclick="document.getElementById('scriptInput').click()">PDF UPLOAD</button>
        <button class="mic-btn" id="micBtn" onclick="toggleDictation()">🎙️</button>
        <input type="text" id="userInput" placeholder="Defend your genius..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button class="btn" onclick="sendChat()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        let audioBuffers = {};
        let nextToPlay = 0;
        let isPlaying = false;
        let currentSource = null;
        let hasGreeted = false;
        let totalSentences = 0;
        let recognition = ('webkitSpeechRecognition' in window) ? new webkitSpeechRecognition() : null;

        function addMessage(text, isFrank = true) {
            const div = document.createElement('div');
            div.className = `msg ${isFrank ? 'frank-msg' : 'user-msg'}`;
            div.innerText = text;
            if (isFrank) {
                const dl = document.createElement('button');
                dl.className = 'download-btn';
                dl.innerText = "↓ SAVE THIS REPORT";
                dl.onclick = () => downloadReport(text);
                div.appendChild(dl);
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function downloadReport(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Frank_Notes.txt`;
            a.click();
        }

        // --- SIMPLIFIED DICTIONARY ---
        function cleanForSpeech(text) {
            return text
                .replace(/\bPDF\b/gi, "P.D.F.")
                .replace(/\bLogline\b/gi, "Log-line")
                .replace(/\bVerdict\b/gi, "Ver-dict")
                .replace(/\bA-Story\b/gi, "Ay story")
                .replace(/\bB-Story\b/gi, "Bee story")
                .replace(/\bC-Story\b/gi, "See story")
                .replace(/[*#]/g, "")
                .trim();
        }

        async function handleFirstInteraction() {
            if (hasGreeted) return;
            hasGreeted = true;
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            speak("Hey there, I'm Frank. If you're looking for honest feedback on your screenplays, you've come to the right place. Upload a P.D.F to begin. I'm like, really smart.");
        }

        async function speak(fullText) {
            const settings = await fetch('/voice-settings').then(r => r.json());
            const sentences = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
            audioBuffers = {};
            nextToPlay = 0;
            totalSentences = sentences.length;

            sentences.forEach(async (sentence, index) => {
                try {
                    const response = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST",
                        headers: { "Authorization": `Basic ${settings.apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            text: cleanForSpeech(sentence), 
                            voiceId: "Simon", 
                            modelId: "inworld-tts-1.5-max" 
                        })
                    });
                    const data = await response.json();
                    const audioData = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0)).buffer;
                    audioBuffers[index] = await audioCtx.decodeAudioData(audioData);
                    if (!isPlaying && index === nextToPlay) playSequentially();
                } catch (e) { console.error(e); }
            });
        }

        function playSequentially() {
            if (nextToPlay >= totalSentences) { isPlaying = false; return; }
            if (audioBuffers[nextToPlay]) {
                isPlaying = true;
                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = audioBuffers[nextToPlay];
                currentSource.connect(audioCtx.destination);
                currentSource.onended = () => { if (isPlaying) { nextToPlay++; playSequentially(); } };
                currentSource.start();
            } else { setTimeout(playSequentially, 100); }
        }

        function togglePlayback() {
            if (isPlaying) {
                isPlaying = false;
                if (currentSource) currentSource.stop();
                document.getElementById('playPauseBtn').innerText = "PLAY";
            } else { playSequentially(); document.getElementById('playPauseBtn').innerText = "PAUSE"; }
        }

        function skipAudio(direction) {
            if (currentSource) currentSource.stop();
            nextToPlay = Math.max(0, Math.min(totalSentences - 1, nextToPlay + direction));
            playSequentially();
        }

        async function uploadScript() {
            const fileInput = document.getElementById('scriptInput');
            if (!fileInput.files[0]) return;
            addMessage("Frank is settling in with your script... hold your breath, darling.", true);
            const formData = new FormData();
            formData.append('script', fileInput.files[0]);
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            addMessage(data.message, true);
            speak(data.message);
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if (!text) return;
            addMessage(text, false);
            input.value = '';
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            addMessage(data.message, true);
            speak(data.message);
        }

        if (recognition) {
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('mic-active');
            };
        }
        function toggleDictation() {
            document.getElementById('micBtn').classList.add('mic-active');
            recognition.start();
        }
    </script>
</body>
</html>
