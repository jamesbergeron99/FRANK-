<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRANK | Executive Script Doctor</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; text-align: center; padding: 50px; }
        .office { max-width: 800px; margin: auto; border: 2px solid #d4af37; padding: 40px; background: #111; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        h1 { font-style: italic; letter-spacing: 3px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; }
        #output { background: #000; color: #eee; padding: 25px; min-height: 200px; margin-top: 25px; text-align: left; white-space: pre-line; border-left: 5px solid #d4af37; font-size: 1.1rem; }
        .btn { background: #d4af37; color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; font-size: 1rem; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="office">
        <h1>FRANK</h1>
        <p><em>"Development is a blood sport, darling."</em></p>
        
        <div id="output">"Bring me something worth reading, darling..."</div>
        
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" onchange="startAnalysis()">
        
        <button class="btn" onclick="document.getElementById('scriptInput').click()">PDF UPLOAD</button>
    </div>

    <script src="https://unpkg.com/@inworld/web-sdk"></script>
    <script>
        async function startAnalysis() {
            const fileInput = document.getElementById('scriptInput');
            const output = document.getElementById('output');
            
            if (!fileInput.files[0]) return;

            output.innerText = "Frank is lighting a cigarette and opening the file...";

            const formData = new FormData();
            formData.append('script', fileInput.files[0]);

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.error) {
                    output.innerText = "Frank says: " + data.error;
                    return;
                }

                output.innerText = data.message;

                // TRIGGER VOICE
                if (data.apiKey) {
                    const connection = new Inworld.InworldConnectionService()
                        .setApiKey(data.apiKey)
                        .setScene(data.characterId)
                        .build();

                    await connection.open();
                    await connection.sendText(data.message);
                }
            } catch (err) {
                console.error(err);
                output.innerText = "Frank is annoyed. The server didn't respond.";
            }
        }
    </script>
</body>
</html>
