<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRANK'S RECORDING STUDIO</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #d4af37; padding: 50px; text-align: center; background: #111; }
        button { background: #d4af37; color: #000; padding: 20px 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-style: italic; margin-bottom: 30px;">"Ready for your close-up, Frank?"</h1>
        <button onclick="speak()">PLAY MASTER GREETING</button>
        <p id="status" style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">Ready to record...</p>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        const GREETING = "Hey there, I’m Frank. And not just in name, darling. I’m a sophisticated AI engineered to scan the DNA of your story. For a mere five dollars per feedback, I perform a comprehensive narrative autopsy using eighteen industry-standard parameters. I provide a rigorous spelling and grammar check, a strict formatting audit, a punchy log line, and a detailed synopsis. Then, I dive deep into your character arcs, pacing, and commercial viability. To begin, simply click the link below. You will be redirected to PayPal for a secure payment, and then sent straight to my office to upload your pages. I’m ready to work if you are.";

        async function speak() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('status').innerText = "FRANK IS SPEAKING...";
            
            const sentences = GREETING.match(/[^.!?]+[.!?]+/g) || [GREETING];
            
            for (let i = 0; i < sentences.length; i++) {
                try {
                    const settingsResp = await fetch('/voice-settings');
                    const settings = await settingsResp.json();
                    const ttsResp = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST",
                        headers: { "Authorization": `Basic ${settings.apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ text: sentences[i], voiceId: "default-oglabcjnetcklcq7rghmbw__frank", modelId: "inworld-tts-1.5-max" })
                    });
                    const data = await ttsResp.json();
                    const audioData = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0)).buffer;
                    const buffer = await audioCtx.decodeAudioData(audioData);
                    
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    const ended = new Promise(resolve => source.onended = resolve);
                    source.start();
                    await ended;
                } catch (e) {
                    console.error(e);
                    document.getElementById('status').innerText = "ERROR: CHECK RENDER LOGS";
                }
            }
            document.getElementById('status').innerText = "FINISH. READY TO RECORD AGAIN.";
        }
    </script>
</body>
</html>
