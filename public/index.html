<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frank's $5 Feedback - Private Office</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #auth-check { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .header { padding: 25px 15px; border-bottom: 2px solid #d4af37; background: #111; text-align: center; }
        h1 { margin: 0; font-style: italic; letter-spacing: 3px; text-transform: uppercase; font-size: 2.2rem; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; padding-bottom: 150px; }
        .msg { max-width: 95%; padding: 30px; border-radius: 10px; line-height: 1.8; font-size: 1.15rem; white-space: pre-wrap; align-self: flex-start; background: #1a1a1a; border-left: 5px solid #d4af37; color: #eee; }
        .controls { padding: 25px; background: #111; border-top: 2px solid #d4af37; display: flex; justify-content: center; gap: 30px; }
        .btn { background: #d4af37; color: #000; padding: 18px 50px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; }
        .btn:disabled { background: #444; color: #888; }
    </style>
</head>
<body>
    <div id="auth-check"><h1>VERIFYING PAYMENT...</h1></div>

    <div class="header"><h1>FRANK'S $5 FEEDBACK</h1></div>
    <div id="chat-window"></div>
    <div class="controls">
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" onchange="uploadFiles()">
        <button class="btn" id="uploadBtn" onclick="document.getElementById('scriptInput').click()">UPLOAD PAGES</button>
    </div>

    <script>
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            // If PayPal returns 'st' or local storage says paid, show the app
            if (urlParams.has('st') || localStorage.getItem('frank_paid') === 'true') {
                localStorage.setItem('frank_paid', 'true');
                document.getElementById('auth-check').style.display = 'none';
                addMessage("Frank is in. I've cleared my schedule. Upload your pages.");
            } else {
                window.location.href = "https://www.scriptread.ca";
            }
        };

        async function uploadFiles() {
            const fileInput = document.getElementById('scriptInput');
            const uploadBtn = document.getElementById('uploadBtn');
            if (fileInput.files.length === 0) return;

            uploadBtn.disabled = true;
            uploadBtn.innerText = "AUDITING...";
            addMessage("Preparing forensic audit...");

            const formData = new FormData();
            formData.append('scripts', fileInput.files[0]);
            const memory = localStorage.getItem('frank_last_feedback');
            if (memory) formData.append('previousContext', memory);

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                localStorage.setItem('frank_last_feedback', data.message);
                addMessage(data.message);
                
                // Reset for next episode
                uploadBtn.disabled = false;
                uploadBtn.innerText = "NEXT EPISODE ($5)";
                uploadBtn.onclick = () => {
                    localStorage.removeItem('frank_paid');
                    window.location.href = "https://www.paypal.com/ncp/payment/VRYUFK4H8K6M6";
                };
            } catch (err) {
                addMessage("Error connecting to Frank.");
                uploadBtn.disabled = false;
            }
        }

        function addMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = text;
            document.getElementById('chat-window').appendChild(div);
            document.getElementById('chat-window').scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
