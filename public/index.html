<script>
    const chatWindow = document.getElementById('chat-window');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    let audioBuffers = {}, nextToPlay = 0, isPlaying = false, currentSource = null, hasGreeted = false, totalSentences = 0;
    let recognition = null, isDictating = false, finalTranscript = '';

    // NEW: Check if they just returned from PayPal
    // You can add ?status=paid to your PayPal return URL to make this 100% bulletproof
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('amt') || urlParams.has('tx') || urlParams.has('st')) {
        localStorage.setItem('frank_paid', 'true');
        // Clean the URL so the buttons don't look messy
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    const FULL_GREETING = "Hello, darling. I’m Frank. I’m a sophisticated AI engine engineered to scan the DNA of your story. For a mere five dollars per feedback, I perform a comprehensive narrative autopsy. I provide a rigorous spelling and grammar check, a strict formatting audit, a punchy logline, and a detailed synopsis. Then, I dive deep into your character arcs, pacing, and originality. If you're working on a series, I track multiple storylines and trajectories across every episode to ensure your continuity is flawless. Click anywhere again to proceed to payment and let's get to work.";

    function handleInteraction() {
        // If they already paid, don't trigger the paywall logic at all
        if (localStorage.getItem('frank_paid') === 'true') {
            if (!hasGreeted) {
                hasGreeted = true;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                document.getElementById('intro-msg').innerText = "Welcome back, darling. Payment confirmed. I'm ready for your pages.";
                speak("Welcome back, darling. Payment confirmed. I'm ready for your pages.");
            }
            return; 
        }

        if (!hasGreeted) {
            hasGreeted = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('intro-msg').innerText = FULL_GREETING;
            speak(FULL_GREETING);
        } else {
            const overlay = document.getElementById('paywall-overlay');
            if (overlay.style.display === 'none' || overlay.style.display === '') {
                stopCurrentAudio();
                overlay.style.display = 'flex';
            }
        }
    }

    // After a successful upload/analysis, we clear the paid flag 
    // so they have to pay for the NEXT script.
    async function uploadFiles() {
        const fileInput = document.getElementById('scriptInput');
        const mode = document.getElementById('modeToggle').checked ? 'TV Series' : 'Feature';
        if (fileInput.files.length === 0) return;
        
        addMessage(`Frank is initiating a ${mode} scan...`, true);
        const formData = new FormData();
        formData.append('mode', mode);
        for (let i = 0; i < fileInput.files.length; i++) formData.append('scripts', fileInput.files[i]);
        
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            addMessage(data.message); 
            speak(data.message);
            
            // TRANSACTION COMPLETE: Clear the "paid" status so the next script requires a new $5
            localStorage.removeItem('frank_paid');
            
        } catch (err) {
            addMessage("Something went wrong, darling. Try again.");
        }
    }

    // ... (Keep the rest of your existing functions: speak, stopCurrentAudio, etc.) ...
</script>
