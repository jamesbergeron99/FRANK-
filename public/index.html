<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRANK | Executive Script Doctor</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #d4af37; background: #111; text-align: center; shrink-0; position: relative; }
        h1 { margin: 0; font-style: italic; letter-spacing: 3px; text-transform: uppercase; }
        .toggle-container { margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; border: 1px solid #d4af37; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: #d4af37; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #d4af37; }
        input:checked + .slider:before { transform: translateX(24px); background-color: #000; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; scroll-behavior: smooth; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 8px; line-height: 1.5; font-size: 1.1rem; white-space: pre-wrap; position: relative; }
        .frank-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #d4af37; color: #eee; }
        .user-msg { align-self: flex-end; background: #d4af37; color: #000; font-weight: bold; }
        .download-btn { display: block; margin-top: 10px; font-size: 0.8rem; color: #d4af37; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; }
        .controls { padding: 15px; background: #111; border-top: 2px solid #d4af37; display: flex; gap: 10px; align-items: center; shrink-0; }
        input[type="text"] { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #d4af37; color: #d4af37; font-size: 1rem; }
        .media-bar { background: #1a1a1a; border-top: 1px solid #333; padding: 10px; display: flex; justify-content: center; gap: 20px; align-items: center; }
        .media-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 15px; cursor: pointer; font-family: serif; font-size: 0.9rem; }
        .btn { background: #d4af37; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .mic-btn { background: #800; color: #fff; border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .mic-active { background: #f00; box-shadow: 0 0 15px #f00; }
    </style>
</head>
<body onclick="handleFirstInteraction()">
    <div class="header">
        <h1>FRANK</h1>
        <p><em>"Development is a blood sport, darling."</em></p>
        <div class="toggle-container">
            <span>FEATURE FILM</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
            <span>TV SERIES</span>
        </div>
    </div>

    <div id="chat-window">
        <div class="msg frank-msg">"Hey there, I'm Frank. Upload your pages, and let's see if you've actually got a story or just a collection of scenes. I'm ready when you are."</div>
    </div>

    <div class="media-bar">
        <button class="media-btn" onclick="skipAudio(-1)">« BACK</button>
        <button class="media-btn" id="playPauseBtn" onclick="togglePlayback()">PAUSE</button>
        <button class="media-btn" onclick="skipAudio(1)">NEXT »</button>
    </div>

    <div class="controls">
        <input type="file" id="scriptInput" accept=".pdf" style="display:none;" multiple onchange="uploadFiles()">
        <button class="btn" onclick="document.getElementById('scriptInput').click()">PDF UPLOAD</button>
        <button class="mic-btn" id="micBtn" onclick="toggleDictation()">🎙️</button>
        <input type="text" id="userInput" placeholder="Defend your choices..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button class="btn" onclick="sendChat()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        let audioBuffers = {}, nextToPlay = 0, isPlaying = false, currentSource = null, hasGreeted = false, totalSentences = 0;
        let recognition = null, isDictating = false, finalTranscript = '';

        // REAL-TIME DICTATION LOGIC
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true; 

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                document.getElementById('userInput').value = finalTranscript + interimTranscript;
            };

            recognition.onerror = (e) => console.error("Mic error:", e.error);
            recognition.onend = () => { if (isDictating) recognition.start(); };
        }

        function toggleDictation() {
            if (!recognition) return;
            const micBtn = document.getElementById('micBtn');
            if (!isDictating) {
                isDictating = true;
                finalTranscript = document.getElementById('userInput').value; 
                micBtn.classList.add('mic-active');
                recognition.start();
            } else {
                isDictating = false;
                micBtn.classList.remove('mic-active');
                recognition.stop();
            }
        }

        function addMessage(text, isFrank = true) {
            const div = document.createElement('div');
            div.className = `msg ${isFrank ? 'frank-msg' : 'user-msg'}`;
            div.innerText = text;
            if (isFrank) {
                const dl = document.createElement('button');
                dl.className = 'download-btn'; dl.innerText = "↓ SAVE THIS REPORT";
                dl.onclick = () => downloadReport(text);
                div.appendChild(dl);
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function downloadReport(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Frank_Report.txt`; a.click();
        }

        async function handleFirstInteraction() {
            if (hasGreeted) return;
            hasGreeted = true;
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        async function speak(fullText) {
            stopCurrentAudio();
            const sentences = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
            audioBuffers = {}; nextToPlay = 0; totalSentences = sentences.length;
            sentences.forEach(async (sentence, index) => {
                try {
                    const response = await fetch('/voice-settings');
                    const settings = await response.json();
                    const ttsResponse = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST",
                        headers: { "Authorization": `Basic ${settings.apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ text: sentence, voiceId: "default-oglabcjnetcklcq7rghmbw__frank", modelId: "inworld-tts-1.5-max" })
                    });
                    const data = await ttsResponse.json();
                    const audioData = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0)).buffer;
                    audioBuffers[index] = await audioCtx.decodeAudioData(audioData);
                    if (!isPlaying && index === nextToPlay) playSequentially();
                } catch (e) { console.error(e); }
            });
        }

        function playSequentially() {
            if (nextToPlay >= totalSentences) { isPlaying = false; return; }
            if (audioBuffers[nextToPlay]) {
                isPlaying = true; document.getElementById('playPauseBtn').innerText = "PAUSE";
                currentSource = audioCtx.createBufferSource();
                currentSource.buffer = audioBuffers[nextToPlay];
                currentSource.connect(audioCtx.destination);
                currentSource.onended = () => { if (isPlaying) { nextToPlay++; playSequentially(); } };
                currentSource.start();
            } else { setTimeout(playSequentially, 150); }
        }

        function stopCurrentAudio() {
            isPlaying = false;
            if (currentSource) { try { currentSource.stop(); } catch (e) {} currentSource = null; }
        }

        function togglePlayback() {
            if (isPlaying) { stopCurrentAudio(); document.getElementById('playPauseBtn').innerText = "PLAY"; }
            else { playSequentially(); document.getElementById('playPauseBtn').innerText = "PAUSE"; }
        }

        function skipAudio(direction) {
            stopCurrentAudio();
            nextToPlay = Math.max(0, Math.min(totalSentences - 1, nextToPlay + direction));
            playSequentially();
        }

        async function uploadFiles() {
            const fileInput = document.getElementById('scriptInput');
            const mode = document.getElementById('modeToggle').checked ? 'TV Series' : 'Feature';
            if (fileInput.files.length === 0) return;
            addMessage(`Frank is reviewing as a ${mode}...`, true);
            const formData = new FormData();
            formData.append('mode', mode);
            for (let i = 0; i < fileInput.files.length; i++) formData.append('scripts', fileInput.files[i]);
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            addMessage(data.message, true); speak(data.message);
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value; if (!text) return;
            addMessage(text, false); 
            input.value = ''; finalTranscript = ''; // Reset dictation state
            const response = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: text }) });
            const data = await response.json();
            addMessage(data.message, true); speak(data.message);
        }
    </script>
</body>
</html>
